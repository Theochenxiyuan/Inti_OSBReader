name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Publish
        run: dotnet publish "Inti_creates_files_Reader/Inti_creates_files_Reader.csproj" -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Zip publish folder
        run: Compress-Archive -Path "Inti_creates_files_Reader\bin\Release\net8.0-windows\win-x64\publish\*" -DestinationPath "Inti_OSBReader_win-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inti_OSBReader_win-x64
          path: Inti_OSBReader_win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Inti_OSBReader_win-x64.zip
          body: |
            Self-contained Windows x64 build. Download the zip, extract, and run `Inti_creates_files_Reader.exe`.
